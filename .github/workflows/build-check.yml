name: Build Check

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Clear SPM binary artifact cache
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts/

      - name: Generate credentials stubs
        run: |
          cp OpenEmu/ScreenScraperDevCredentials.template.swift OpenEmu/ScreenScraperDevCredentials.swift
          cp OpenEmu/OEGoogleDriveSecrets.template.swift OpenEmu/OEGoogleDriveSecrets.swift

      - name: Build OpenEmu (Debug, arm64)
        run: |
          xcodebuild build \
            -workspace OpenEmu-metal.xcworkspace \
            -scheme OpenEmu \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run OpenEmuBaseTests (incl. RA hardcore regression suite)
        run: |
          xcodebuild test \
            -project OpenEmu-SDK/OpenEmu-SDK.xcodeproj \
            -scheme OpenEmuBase \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
