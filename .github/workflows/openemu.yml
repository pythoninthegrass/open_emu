name: OpenEmu.app

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build OpenEmu
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build OpenEmu
        working-directory: ${{github.workspace}}
        run: xcodebuild -workspace "OpenEmu-metal.xcworkspace" -scheme "OpenEmu" -configuration Release -sdk macosx -arch arm64 -derivedDataPath DerivedData CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
      - name: Zip OpenEmu
        working-directory: ${{github.workspace}}/DerivedData/Build/Products/Release/
        run: ditto -c -k --keepParent OpenEmu.app OpenEmu.zip
      - name: Build OpenEmu Experimental
        working-directory: ${{github.workspace}}
        run: xcodebuild -workspace "OpenEmu-metal.xcworkspace" -scheme "OpenEmu (Experimental)" -configuration Release -sdk macosx -arch arm64 -derivedDataPath DerivedData CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
      - name: Zip OpenEmu Experimental
        working-directory: ${{github.workspace}}/DerivedData/Build/Products/Release/
        run: ditto -c -k --keepParent OpenEmu.app OpenEmu-experimental.zip
      - name: Upload OpenEmu
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: OpenEmu.zip
          path: ${{github.workspace}}/DerivedData/Build/Products/Release/OpenEmu.zip
      - name: Upload OpenEmu Experimental
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: OpenEmu-experimental.zip
          path: ${{github.workspace}}/DerivedData/Build/Products/Release/OpenEmu-experimental.zip
