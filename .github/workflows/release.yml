name: Release

# Triggered manually or on version tags (e.g. v1.0.0)
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build, Sign, Notarize, DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate credentials stubs
        run: |
          cp OpenEmu/ScreenScraperDevCredentials.template.swift OpenEmu/ScreenScraperDevCredentials.swift

      # ── Certificate ──────────────────────────────────────────────────────────
      - name: Import Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make it the default so Xcode finds the identity
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      # ── Archive ──────────────────────────────────────────────────────────────
      - name: Archive OpenEmu
        run: |
          xcodebuild archive \
            -workspace OpenEmu-metal.xcworkspace \
            -scheme OpenEmu \
            -configuration Release \
            -destination generic/platform=macOS \
            -archivePath $RUNNER_TEMP/OpenEmu.xcarchive \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual

      # ── Extract signed .app from archive ─────────────────────────────────────
      # Skips xcodebuild -exportArchive (method names changed in Xcode 26).
      # The app is already signed with Developer ID during the archive step.
      - name: Extract app from archive
        run: |
          cp -R \
            "$RUNNER_TEMP/OpenEmu.xcarchive/Products/Applications/OpenEmu.app" \
            "$RUNNER_TEMP/OpenEmu.app"

          # Verify signing before submitting — catches issues early
          codesign --verify --deep --strict "$RUNNER_TEMP/OpenEmu.app"
          echo "Code signing verified OK"

      # ── Notarize .app first, then wrap in DMG ─────────────────────────────────
      # Per community advice: notarize and staple the .app before creating the DMG.
      # Building the DMG around an already-stapled app avoids notarization failures
      # caused by embedded frameworks in nested containers.
      - name: Zip app for notarization
        run: |
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/OpenEmu.app" \
            "$RUNNER_TEMP/OpenEmu-notarize.zip"

      - name: Notarize app
        run: |
          xcrun notarytool submit "$RUNNER_TEMP/OpenEmu-notarize.zip" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait

      - name: Staple notarization ticket to app
        run: |
          xcrun stapler staple "$RUNNER_TEMP/OpenEmu.app"

      # ── DMG — wrap the already-notarized, stapled app ─────────────────────────
      - name: Create DMG
        run: |
          hdiutil create \
            -volname "OpenEmu-Silicon" \
            -srcfolder "$RUNNER_TEMP/OpenEmu.app" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/OpenEmu-Silicon.dmg"

      - name: Staple DMG
        run: |
          xcrun stapler staple "$RUNNER_TEMP/OpenEmu-Silicon.dmg"

      # ── Release ──────────────────────────────────────────────────────────────
      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "OpenEmu-Silicon ${{ steps.tag.outputs.name }}"
          draft: true
          files: ${{ runner.temp }}/OpenEmu-Silicon.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Cleanup ───────────────────────────────────────────────────────────────
      - name: Remove temporary keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
