name: Release

# Triggered manually or on version tags (e.g. v1.0.0)
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build, Sign, Notarize, DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate credentials stubs
        run: |
          cp OpenEmu/ScreenScraperDevCredentials.template.swift OpenEmu/ScreenScraperDevCredentials.swift

      # ── Certificate ──────────────────────────────────────────────────────────
      - name: Import Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make it the default so Xcode finds the identity
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      # ── Archive ──────────────────────────────────────────────────────────────
      - name: Archive OpenEmu
        run: |
          xcodebuild archive \
            -workspace OpenEmu-metal.xcworkspace \
            -scheme OpenEmu \
            -configuration Release \
            -destination generic/platform=macOS \
            -archivePath $RUNNER_TEMP/OpenEmu.xcarchive \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES

      # ── Extract signed .app from archive ─────────────────────────────────────
      # Skips xcodebuild -exportArchive (method names changed in Xcode 26).
      # The app is already signed with Developer ID during the archive step.
      - name: Extract app from archive
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/OpenEmu.xcarchive/Products" -name "OpenEmu.app" -maxdepth 4 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: OpenEmu.app not found in archive. Archive contents:"
            find "$RUNNER_TEMP/OpenEmu.xcarchive/Products" -maxdepth 4
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" "$RUNNER_TEMP/OpenEmu.app"

      # ── Re-sign Sparkle helpers with Developer ID ────────────────────────────
      # Xcode re-signs the main app but leaves Sparkle's pre-signed nested helpers
      # (Updater.app, Autoupdate, XPC services) with their original Apple Development
      # signature. Notarization requires all binaries to have Developer ID + secure
      # timestamp. Sign inside-out so outer signatures aren't invalidated.
      - name: Re-sign Sparkle helpers for notarization
        run: |
          APP="$RUNNER_TEMP/OpenEmu.app"
          IDENTITY="Developer ID Application"
          SPARKLE="$APP/Contents/Frameworks/Sparkle.framework/Versions/B"

          for item in \
            "$SPARKLE/XPCServices/Downloader.xpc/Contents/MacOS/Downloader" \
            "$SPARKLE/XPCServices/Installer.xpc/Contents/MacOS/Installer" \
            "$SPARKLE/XPCServices/Downloader.xpc" \
            "$SPARKLE/XPCServices/Installer.xpc" \
            "$SPARKLE/Autoupdate" \
            "$SPARKLE/Updater.app/Contents/MacOS/Updater" \
            "$SPARKLE/Updater.app" \
            "$SPARKLE/Sparkle" \
            "$APP/Contents/Frameworks/Sparkle.framework"; do
            if [ -e "$item" ]; then
              codesign --force --sign "$IDENTITY" --options runtime --timestamp "$item"
            fi
          done

          # Re-sign the main app to incorporate the updated framework signatures
          codesign --force --sign "$IDENTITY" --options runtime --timestamp "$APP"

          # Final verification before submitting
          codesign --verify --deep --strict "$APP"
          echo "Re-signing complete"

      # ── Notarize .app first, then wrap in DMG ─────────────────────────────────
      # Per community advice: notarize and staple the .app before creating the DMG.
      # Building the DMG around an already-stapled app avoids notarization failures
      # caused by embedded frameworks in nested containers.
      - name: Zip app for notarization
        run: |
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/OpenEmu.app" \
            "$RUNNER_TEMP/OpenEmu-notarize.zip"

      - name: Notarize app
        # Use --no-wait + polling loop instead of --wait to avoid long-lived
        # connections that drop when Apple's service is slow (seen taking 5-46 min).
        # Each poll is a short independent request resilient to network blips.
        # Poll every 30s for the first 5 iterations (Apple often finishes in 2-5 min),
        # then back off to 60s — total budget ~72 minutes before timing out.
        id: notarize
        timeout-minutes: 90
        run: |
          RESULT=$(xcrun notarytool submit "$RUNNER_TEMP/OpenEmu-notarize.zip" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --no-wait --output-format json)
          echo "$RESULT"
          ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Submission ID: $ID"
          echo "NOTARY_ID=$ID" >> $GITHUB_OUTPUT
          echo "::notice title=Notarization Submission ID::$ID"

          STATUS="In Progress"
          ERR_COUNT=0
          for i in $(seq 1 70); do
            if [ "$i" -le 5 ]; then sleep 30; else sleep 60; fi
            ELAPSED=$(( i <= 5 ? i * 30 : 150 + (i - 5) * 60 ))
            POLL=$(xcrun notarytool info "$ID" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_ID_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --output-format json 2>/dev/null || echo '{"status":"error"}')
            STATUS=$(echo "$POLL" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','error'))" 2>/dev/null || echo "error")
            if [ "$STATUS" = "error" ]; then
              ERR_COUNT=$((ERR_COUNT + 1))
              echo "[$i/70] Network error (${ERR_COUNT} consecutive, ≈${ELAPSED}s elapsed)"
              if [ "$ERR_COUNT" -ge 5 ]; then
                echo "Too many consecutive network errors — giving up."
                exit 1
              fi
              continue
            fi
            ERR_COUNT=0
            echo "[$i/70] Status: $STATUS (≈${ELAPSED}s elapsed)"
            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization accepted."
              break
            elif [ "$STATUS" = "Invalid" ]; then
              echo "Notarization rejected. Fetching log..."
              xcrun notarytool log "$ID" \
                --apple-id "${{ secrets.APPLE_ID }}" \
                --password "${{ secrets.APPLE_ID_PASSWORD }}" \
                --team-id "${{ secrets.APPLE_TEAM_ID }}"
              exit 1
            fi
          done

          if [ "$STATUS" != "Accepted" ]; then
            echo "Timed out. Final status: $STATUS"
            exit 1
          fi

      - name: Staple notarization ticket to app
        run: |
          xcrun stapler staple "$RUNNER_TEMP/OpenEmu.app"

      # ── DMG — wrap the already-notarized, stapled app ─────────────────────────
      - name: Create DMG
        run: |
          hdiutil create \
            -volname "OpenEmu-Silicon" \
            -srcfolder "$RUNNER_TEMP/OpenEmu.app" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/OpenEmu-Silicon.dmg"

      - name: Staple DMG
        run: |
          xcrun stapler staple "$RUNNER_TEMP/OpenEmu-Silicon.dmg"

      # ── Release ──────────────────────────────────────────────────────────────
      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "OpenEmu-Silicon ${{ steps.tag.outputs.name }}"
          draft: true
          files: ${{ runner.temp }}/OpenEmu-Silicon.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Cleanup ───────────────────────────────────────────────────────────────
      - name: Remove temporary keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
